name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: 1.0.0
  push:
    tags:
      - "v*"

jobs:
  package:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "APP_VERSION=${{ inputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          else {
            $version = "${{ github.ref_name }}".TrimStart("v")
            "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Restore runtime assets
        shell: pwsh
        run: dotnet restore .\LolStatusMusicBridge\LolStatusMusicBridge.csproj -r win-x64

      - name: Publish release files
        shell: pwsh
        run: |
          $publishDir = ".\artifacts\publish\LolStatusMusicBridge-win-x64"
          if (Test-Path $publishDir) {
            Remove-Item -LiteralPath $publishDir -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path ".\artifacts\publish" | Out-Null
          New-Item -ItemType Directory -Force -Path ".\artifacts\release" | Out-Null

          dotnet publish .\LolStatusMusicBridge\LolStatusMusicBridge.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --output $publishDir `
            -p:Version=$env:APP_VERSION `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false

          if ($LASTEXITCODE -ne 0) {
            throw "dotnet publish failed with exit code $LASTEXITCODE."
          }

          Copy-Item -LiteralPath ".\README.md" -Destination (Join-Path $publishDir "README.md") -Force
          $zipPath = ".\artifacts\release\LolStatusMusicBridge-$env:APP_VERSION-win-x64.zip"

          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $publishDir "*") -DestinationPath $zipPath -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: LolStatusMusicBridge-${{ env.APP_VERSION }}-win-x64
          path: artifacts/release/*.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/release/*.zip
          generate_release_notes: true
